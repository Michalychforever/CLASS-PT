name: Sync upstream CLASS

on:
  push:
    branches: [class_v3_public]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: class_v3_public
          fetch-depth: 0

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/lesgourg/class_public.git || true
          git fetch upstream master --tags

      - name: Check for new upstream commits
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/master)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          echo "Upstream is $BEHIND commits ahead"

      - name: Attempt merge
        if: steps.check.outputs.behind != '0'
        id: merge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b sync-upstream
          if git merge upstream/master --no-edit; then
            echo "conflict=false" >> "$GITHUB_OUTPUT"
          else
            git merge --abort
            echo "conflict=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push clean merge
        if: steps.check.outputs.behind != '0' && steps.merge.outputs.conflict == 'false'
        run: git push origin sync-upstream --force

      - name: Push conflict branch
        if: steps.check.outputs.behind != '0' && steps.merge.outputs.conflict == 'true'
        run: |
          git checkout -b sync-upstream-conflict
          git merge upstream/master --no-commit --no-ff || true
          git add -A
          git commit -m "WIP: upstream sync with conflicts (needs manual resolution)"
          git push origin sync-upstream-conflict --force

      - name: Create PR (clean merge)
        if: steps.check.outputs.behind != '0' && steps.merge.outputs.conflict == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BEHIND=${{ steps.check.outputs.behind }}
          EXISTING=$(gh pr list --head sync-upstream --base class_v3_public --json number --jq '.[0].number' || echo "")
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists, updated branch"
          else
            gh pr create \
              --title "Sync upstream CLASS ($BEHIND new commits)" \
              --base class_v3_public \
              --head sync-upstream \
              --body "$(cat <<'EOF'
          ## Upstream sync

          Merges ${{ steps.check.outputs.behind }} new commits from [lesgourg/class_public](https://github.com/lesgourg/class_public) master.

          **No conflicts detected** — merge was clean. Review the changes and merge when ready.
          EOF
          )"
          fi

      - name: Create PR (with conflicts)
        if: steps.check.outputs.behind != '0' && steps.merge.outputs.conflict == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BEHIND=${{ steps.check.outputs.behind }}
          EXISTING=$(gh pr list --head sync-upstream-conflict --base class_v3_public --json number --jq '.[0].number' || echo "")
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists, updated branch"
          else
            gh pr create \
              --title "Sync upstream CLASS ($BEHIND new commits) — CONFLICTS" \
              --base class_v3_public \
              --head sync-upstream-conflict \
              --body "$(cat <<'EOF'
          ## Upstream sync — manual resolution needed

          Attempted to merge ${{ steps.check.outputs.behind }} new commits from [lesgourg/class_public](https://github.com/lesgourg/class_public) master.

          **Conflicts detected.** Files likely affected: `source/input.c`, `source/transfer.c`, `Makefile`, or other files modified by CLASS-PT.

          To resolve locally:
          ```bash
          git fetch origin sync-upstream-conflict
          git checkout sync-upstream-conflict
          git fetch upstream master
          git merge upstream/master
          # resolve conflicts, then commit and push
          ```
          EOF
          )"
          fi
